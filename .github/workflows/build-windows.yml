name: Build Windows installer

# Triggers:
#   - on tag push (v*.*.*) → builds and uploads the .exe to that tag's GitHub Release
#   - manually via workflow_dispatch → produces a downloadable artifact (no release upload)
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # needed to upload assets to a GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0"

      - name: Run PyInstaller
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --distpath dist --workpath build/build build/bitaxe-baller.spec

      - name: Show output tree
        shell: pwsh
        run: |
          Get-ChildItem -Path dist -Recurse -Depth 2 | Format-Table -AutoSize

      - name: Stage release zip + standalone .exe (for direct download)
        shell: pwsh
        run: |
          # PyInstaller produced dist/Bitaxe Baller/ directory containing the .exe + bundled deps
          $stage = "dist/Bitaxe Baller"
          if (-not (Test-Path $stage)) { throw "Expected $stage to exist" }

          # Pack as a single zip the user can extract anywhere
          Compress-Archive -Path "$stage/*" -DestinationPath "dist/Bitaxe-Baller-Windows.zip" -Force

          # Also keep the .exe alone — the site's /download/windows redirects to a single file
          Copy-Item "$stage/Bitaxe Baller.exe" "dist/Bitaxe-Baller-Windows.exe"

      - name: Upload as workflow artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: bitaxe-baller-windows
          path: |
            dist/Bitaxe-Baller-Windows.exe
            dist/Bitaxe-Baller-Windows.zip
          retention-days: 30

      - name: Attach to GitHub Release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Bitaxe-Baller-Windows.exe
            dist/Bitaxe-Baller-Windows.zip
          fail_on_unmatched_files: true
