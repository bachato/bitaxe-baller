name: Build Windows installer

# Triggers:
#   - on tag push (v*.*.*) → builds and uploads the .exe to that tag's GitHub Release
#   - manually via workflow_dispatch → produces a downloadable artifact (no release upload)
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # needed to upload assets to a GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0"

      - name: Run PyInstaller
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --distpath dist --workpath build/build build/bitaxe-baller.spec

      - name: Show output tree
        shell: pwsh
        run: |
          Get-ChildItem -Path dist -Recurse -Depth 2 | Format-Table -AutoSize

      - name: Compile Inno Setup installer
        shell: pwsh
        run: |
          # One-folder PyInstaller emits dist/Bitaxe Baller/ (.exe + _internal/).
          $stage = "dist/Bitaxe Baller"
          if (-not (Test-Path $stage)) { throw "Expected $stage to exist (one-folder build output)" }
          # iscc (Inno Setup compiler) is pre-installed on GitHub-hosted
          # windows-latest runners as part of the included tooling.
          & "${env:ProgramFiles(x86)}\Inno Setup 6\iscc.exe" build\installer.iss
          if (-not (Test-Path "dist/Bitaxe-Baller-Windows.exe")) {
            throw "Inno Setup did not produce dist/Bitaxe-Baller-Windows.exe"
          }

      # Sign the Windows artifact for the auto-update feed. This is the
      # Ed25519 signature inside appcast.xml — separate from (and not a
      # substitute for) Authenticode code signing, which is gated on the
      # Azure Trusted Signing identity validation. SmartScreen warnings will
      # remain until that lands, but auto-update once installed will work.
      #
      # Skips silently if UPDATE_SIGNING_KEY isn't configured yet. build-appcast.py
      # exits non-zero in that case; we trap the failure so a missing secret
      # doesn't break the .exe build during the rollout window.
      - name: Generate signed appcast entry
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          UPDATE_SIGNING_KEY: ${{ secrets.UPDATE_SIGNING_KEY }}
        run: |
          if (-not $env:UPDATE_SIGNING_KEY) {
            Write-Host "UPDATE_SIGNING_KEY secret not set — skipping appcast generation."
            exit 0
          }
          $version = "${{ github.ref_name }}".TrimStart('v')
          python build/build-appcast.py `
            --version $version `
            --win-exe dist/Bitaxe-Baller-Windows.exe `
            --release-notes-url "https://github.com/465media/bitaxe-baller/releases/tag/${{ github.ref_name }}" `
            --out dist/appcast.xml
          Get-Content dist/appcast.xml

      - name: Upload as workflow artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: bitaxe-baller-windows
          path: dist/Bitaxe-Baller-Windows.exe
          retention-days: 30

      - name: Attach to GitHub Release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # appcast.xml only exists when the signing secret is set; the glob
          # form tolerates its absence during the rollout window.
          files: |
            dist/Bitaxe-Baller-Windows.exe
            dist/appcast.xml
          fail_on_unmatched_files: false
