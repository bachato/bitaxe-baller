# Bitaxe Baller — Umbrel compose template.
#
# Networking model
# ----------------
# We need `network_mode: host` for the bitaxe-baller container so the
# LAN scanner can probe every IP on the host's /24, and so the mDNS
# publisher can announce `bitaxe-baller.local`. Both break under bridge
# networking.
#
# Umbrel's `app_proxy` runs on the bridge network and tries to talk to
# the app over Docker DNS — which doesn't work when the app is on host
# networking. The fix (cribbed from imlenti/minerwatch's compose): point
# app_proxy at `host.docker.internal:<host-port>` via extra_hosts.
#
# Port routing
# ------------
# Port 5050 (our usual native LAN default) collides with two existing
# official Umbrel apps (passky-server, home-assistant-fusion-ui). We use
# 13700 / 13701 instead — both unused in the Umbrel app registry, and
# 13700 is a memorable nod to the BM1370 chip in the Bitaxe Gamma.
#
#   * manifest port = 13700 (in umbrel-app.yml) — Umbrel binds the proxy
#     here on the host, so the Umbrel tile URL is <umbrel-host>:13700
#   * bitaxe-baller container binds host:13701 (different port to avoid
#     contention with the proxy on 13700)
#   * proxy forwards 13700 → host.docker.internal:13701 → web on host net
#   * direct LAN access at <umbrel-host>:13701 also works
#   * mDNS publishes `bitaxe-baller.local:13701`
#
# Source of truth: mirrored to community-store repo at
# github.com/465media/umbrel-bitaxe-baller-store/bitaxeballer-app/.

version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: host.docker.internal
      APP_PORT: 13701
      PROXY_AUTH_ADD: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    image: ghcr.io/465media/bitaxe-baller:latest@sha256:f42520ce9ad8c58f5ffd0314a7ff3f9395161b69516a2b4f7ddc26d26bb44578
    restart: on-failure
    stop_grace_period: 15s
    network_mode: host
    environment:
      BITAXE_BALLER_DATA_DIR: /data
      HOST: 0.0.0.0
      PORT: 13701
      MDNS_ENABLED: 1
      BITAXE_BALLER_NO_AUTO_OPEN: 1
    volumes:
      - ${APP_DATA_DIR}/data:/data
