# Umbrel community app manifest for Bitaxe Baller.
#
# Spec reference: https://github.com/getumbrel/umbrel-apps/blob/master/.github/UMBREL_APP_YAML_SPEC.md
#
# Umbrel community-store convention: the app `id` MUST be prefixed with the
# store `id` from umbrel-app-store.yml, and the folder name MUST match the
# app id. Store id is "bitaxeballer", so:
#   - app id:     bitaxeballer-app
#   - folder:     bitaxeballer-app/
# Mirrored from this file to community-store repo at
# github.com/465media/umbrel-bitaxe-baller-store/bitaxeballer-app/umbrel-app.yml

manifestVersion: 1
id: bitaxeballer-app
disabled: false
name: Bitaxe Baller
tagline: Live dashboard + tuner for your fleet of Bitaxe Bitcoin miners
icon: https://bitaxeballer.com/img/icon-dark.svg
category: bitcoin

# Semver, matches APP_VERSION in app.py and the Mac/Windows release tags.
# Bump in lockstep with the desktop release.
version: "1.13.0"

port: 13700
description: >-
  Bitaxe Baller is the dashboard + tuner that hobbyist Bitaxe miners actually
  want. Auto-discovers every Bitaxe on your LAN, polls each one every 5
  seconds, surfaces tuning recommendations with one-click apply, charts
  hashrate and temperatures over time, and writes per-device CSV logs you
  can drop into pandas or Excel.


  Native UIs on Mac and Windows — and now on Umbrel. Run it on your home
  server alongside your Bitcoin Core, Mempool, Electrs, etc., and your
  fleet stays under monitoring 24/7 without leaving your Mac open.


  Free tier includes the full LAN dashboard, mDNS publishing, network
  scanner, recommendation engine, tuning controls, fan control, light/dark
  theme, daily CSV logs, the solo block probability widget, the live share
  feed, the local fleet leaderboard, and the public leaderboard at
  bitaxeballer.com/leaderboard (free to enter — top miner per Bitaxe model
  wins a free month of Pro every month).


  Pro tier ($29/year, optional) unlocks bulk tuning across selected
  devices, auto-tune frequency sweeps with hardware safety guardrails,
  90 days of persistent local SQLite history, Discord webhook alerts,
  and remote dashboard access from outside your LAN via the
  relay.bitaxeballer.com WebSocket router.

developer: 465 Media
website: https://bitaxeballer.com
dependencies: []
repo: https://github.com/465media/bitaxe-baller
support: https://bitaxeballer.com/support.html

# Gallery images — Umbrel app store shows these in the app detail view.
# Hosted on bitaxeballer.com so we can update without recutting a release.
# (device-detail.jpg + tune-panel.jpg pending — add back here when they're
# uploaded to bitaxeballer.com/img/screenshots/.)
gallery:
  - https://bitaxeballer.com/img/screenshots/home.jpg

releaseNotes: >-
  v1.13.0 — First Umbrel release! Run Bitaxe Baller as a native Umbrel app
  on the same home server as your Bitcoin Core, Mempool, and Electrs, with
  data persisted to ~/umbrel/app-data/bitaxe-baller. Adds a temperature
  unit switcher (°C ↔ °F) in the dashboard header that propagates to every
  chart, alert threshold, and tooltip. Public leaderboard remains free —
  top miner per Bitaxe model wins a free month of Pro every month; first
  draw 2026-06-30. Full notes: https://bitaxeballer.com/changelog.html

# Default credentials block — bitaxe-baller has no login (free tier) or
# license-key auth (Pro). Umbrel's app_proxy can wrap with auth on the
# /bitaxe-baller URL, OR users can hit it directly at port 5050.
defaultUsername: ""
defaultPassword: ""

# Path prefix when accessed through Umbrel's reverse proxy.
path: ""

# Show the open-source MIT badge in the app store.
submitter: 465 Media
submission: https://github.com/465media/bitaxe-baller
