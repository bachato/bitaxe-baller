# Bitaxe Baller — Umbrel compose template.
#
# Design note: we don't use Umbrel's `app_proxy` sidecar because that
# sidecar talks to the app over the Docker bridge network, and we need
# `network_mode: host` so the LAN scanner (probing every IP on the host's
# /24 for Bitaxes) and the mDNS publisher (`bitaxe-baller.local`) work.
# Host networking is incompatible with the bridge-network DNS name that
# app_proxy expects. Users reach the app directly at:
#   http://<umbrel-host>:5050         (any LAN device)
#   http://bitaxe-baller.local:5050   (via mDNS / Bonjour)
#   http://umbrel.local:5050          (if Umbrel publishes the same name)
#
# Conventions Umbrel expects:
#   - APP_DATA_DIR is provided by Umbrel at install time and points at
#     ~/umbrel/app-data/bitaxe-baller/data on the host. We bind-mount it
#     to /data inside the container.
#
# Source of truth: this file is mirrored to the community-store repo at
# github.com/465media/umbrel-bitaxe-baller-store/bitaxe-baller/. Edit
# here; sync there with `cp` before tagging a release.

version: "3.7"

services:
  bitaxe-baller:
    image: ghcr.io/465media/bitaxe-baller:1.13.0@sha256:426bdb4fcaf5edba230888f19b074c6cb455b41f0a5ed0f830af640ea6b71e3b
    restart: on-failure
    stop_grace_period: 15s
    network_mode: host
    environment:
      BITAXE_BALLER_DATA_DIR: /data
      HOST: 0.0.0.0
      PORT: 5050
      MDNS_ENABLED: 1
      BITAXE_BALLER_NO_AUTO_OPEN: 1
    volumes:
      - ${APP_DATA_DIR}/data:/data
