# Umbrel community app manifest for Bitaxe Baller.
#
# Spec reference: https://github.com/getumbrel/umbrel-apps/blob/master/.github/UMBREL_APP_YAML_SPEC.md
#
# Umbrel community-store convention: the app `id` MUST be prefixed with the
# store `id` from umbrel-app-store.yml, and the folder name MUST match the
# app id. Store id is "bitaxeballer", so:
#   - app id:     bitaxeballer-app
#   - folder:     bitaxeballer-app/
# Mirrored from this file to community-store repo at
# github.com/465media/umbrel-bitaxe-baller-store/bitaxeballer-app/umbrel-app.yml

manifestVersion: 1
id: bitaxeballer-app
disabled: false
name: Bitaxe Baller
tagline: Live dashboard + tuner for your fleet of Bitaxe Bitcoin miners
icon: https://bitaxeballer.com/img/icon-dark.svg
category: bitcoin

# Semver. Usually matches APP_VERSION in app.py and the Mac/Windows tags.
# Exception: Umbrel-only config hotfixes (port changes, compose tweaks,
# manifest fixes) can bump the patch component independently — the image
# is pinned by digest, so the underlying app code stays the same. Next
# aligned release across all platforms resets this.
version: "1.16.5"

port: 13700
description: >-
  Bitaxe Baller is the dashboard + tuner that hobbyist Bitaxe miners actually
  want. Auto-discovers every Bitaxe on your LAN, polls each one every 5
  seconds, surfaces tuning recommendations with one-click apply, charts
  hashrate and temperatures over time, and writes per-device CSV logs you
  can drop into pandas or Excel.


  Native UIs on Mac and Windows — and now on Umbrel. Run it on your home
  server alongside your Bitcoin Core, Mempool, Electrs, etc., and your
  fleet stays under monitoring 24/7 without leaving your Mac open.


  Free tier includes the full LAN dashboard, mDNS publishing, network
  scanner, recommendation engine, tuning controls, fan control, light/dark
  theme, daily CSV logs, the solo block probability widget, the live share
  feed, the local fleet leaderboard, and the public leaderboard at
  bitaxeballer.com/leaderboard (free to enter — top miner per Bitaxe model
  wins a free month of Pro every month).


  Pro tier ($29/year, optional) unlocks bulk tuning across selected
  devices, auto-tune frequency sweeps with hardware safety guardrails,
  90 days of persistent local SQLite history, Discord webhook alerts,
  and remote dashboard access from outside your LAN via the
  relay.bitaxeballer.com WebSocket router.

developer: 465 Media
website: https://bitaxeballer.com
dependencies: []
repo: https://github.com/465media/bitaxe-baller
support: https://bitaxeballer.com/support.html

# Gallery images — Umbrel app store shows these in the app detail view.
# Hosted on bitaxeballer.com so we can update without recutting a release.
gallery:
  - https://bitaxeballer.com/img/screenshots/home.jpg
  - https://bitaxeballer.com/img/screenshots/detail.jpg
  - https://bitaxeballer.com/img/screenshots/scan.jpg

releaseNotes: >-
  v1.16.5 — Remote access is now free (limited to 1 miner). You no longer
  need Pro to view your fleet from outside your LAN or on the mobile app —
  pair your phone and it just works. Free shows your first miner; Pro shows
  the full fleet.


  v1.16.4 — Two fixes. (1) "Fleet outlier" no longer fires on a correctly
  tuned board just because it's monitored alongside higher-hashrate
  machines — the check now compares each board against its own expected
  output, not raw fleet hashrate. (2) The dashboard re-checks for updates
  periodically, so a tab left open notices new releases without a reload.


  v1.16.3 — Maintenance release. No functional changes from v1.16.2;
  this bump realigns the version across all platforms (Mac, Windows,
  Umbrel) and refreshes the in-app update feed. Everything below is
  unchanged.


  v1.16.2 — Umbrel hotfix bundle. Two bugs from v1.16.0 needed a
  follow-up: (1) the dashboard could lock up and stop refreshing —
  a threading deadlock in the new block-find tracker meant the only
  recovery was an app restart, which several Umbrel users hit; (2)
  saving a fresh email-alerts address fired a burst of "catch-up"
  alerts for every miner already in a tripping state. Both fixed.
  All v1.16.0 features below are unchanged.


  v1.16.0 — the lottery-hit release. The headline: if your Bitaxe ever
  solves a network block, the dashboard now throws a sticky confetti
  overlay until you dismiss it. Continuous spawn, no auto-fade — block
  finds are rare and they deserve to feel rare. Persisted to a JSON
  file so the trophy survives restarts. Block-find events also fan out
  through the existing alert pipeline (Discord + the new email channel
  below) — the alert nobody wants to miss.


  Email alerts (Pro) — get the same alerts you get on Discord, by
  email too. Routed through bitaxeballer.com so your Resend key stays
  off your machine. 20 messages/hour cap as spam defense. Block-found
  events fire through this — your phone buzzes the moment it happens.


  Pool detector — DigiByte + eCash coverage gap fixed. If you pointed
  a Bitaxe at letsmine.it, digihash, dgbpool, weminemore, xeggex, or
  viabtc for non-BTC coins, your card was getting grouped under BTC.
  Now those pools route correctly. Plus dgb1... bech32 worker
  addresses now route unambiguously to DGB.


  Years-until-block ETA now renders for every supported chain (BTC,
  BCH, BSV, XEC, DGB, NMC). Side benefit of the chain-detector fix —
  point a miner at any supported alt-chain and a fleet ETA tile
  appears for it.


  Mobile companion is live on Google Play AND Apple App Store. iOS
  v1.2.1 hotfix in the queue this week to fix a Capacitor + SPM
  packaging issue with the QR scanner.


  Full notes: https://bitaxeballer.com/changelog.html

# Default credentials block — bitaxe-baller has no login (free tier) or
# license-key auth (Pro). Umbrel's app_proxy can wrap with auth on the
# /bitaxe-baller URL, OR users can hit it directly at port 5050.
defaultUsername: ""
defaultPassword: ""

# Path prefix when accessed through Umbrel's reverse proxy.
path: ""

# Show the open-source MIT badge in the app store.
submitter: 465 Media
submission: https://github.com/465media/bitaxe-baller
