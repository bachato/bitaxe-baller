<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="rgba(0,255,156,0.45)"/>
      <stop offset="60%" stop-color="rgba(0,255,156,0.05)"/>
      <stop offset="100%" stop-color="rgba(0,255,156,0)"/>
    </radialGradient>
    <radialGradient id="dot" cx="42%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#79ffc1"/>
      <stop offset="100%" stop-color="#00ff9c"/>
    </radialGradient>
  </defs>

  <!-- Rounded-rect background; macOS/Windows icon launchers will further mask this. -->
  <rect width="1024" height="1024" rx="200" ry="200" fill="#0a0d0c"/>

  <!-- Soft accent glow centered behind the dot -->
  <circle cx="512" cy="512" r="430" fill="url(#glow)"/>

  <!-- Outer ring (the "pulse halo") -->
  <circle cx="512" cy="512" r="290" fill="none" stroke="#00ff9c" stroke-width="14" opacity="0.42"/>

  <!-- Inner solid dot — the core brand mark -->
  <circle cx="512" cy="512" r="190" fill="url(#dot)"/>

  <!-- Tiny highlight for depth -->
  <circle cx="460" cy="450" r="34" fill="rgba(255,255,255,0.18)"/>
</svg>
